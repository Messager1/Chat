<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CompSci Chat</title>
<style>
body {font-family:sans-serif;background:#0f1724;color:#e6eef6;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}
.wrap{width:100%;background:#0b1220;border-radius:12px;display:grid;grid-template-columns:300px 1fr;overflow:hidden;height:100%;}
.panel{padding:20px;background:#121b2e;display:flex;flex-direction:column;gap:10px;}
.chat-area{display:flex;flex-direction:column;height:100%;overflow:hidden;}
.chat-header{padding:15px;border-bottom:1px solid #1b2435;flex-shrink:0;display:grid;grid-template-areas:"header content";}
.messages{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:8px;min-height:0;}
.msg{padding:8px 12px;border-radius:10px;background:rgba(255,255,255,0.05);word-break:break-word;}
.msg.me{background:rgba(45,212,191,0.1);}
.compose{padding:10px;border-top:1px solid #1b2435;display:flex;gap:8px;flex-shrink:0;background:#0b1220;align-items:center;}
.compose input[type=text]{flex:1;padding:8px;border-radius:8px;border:none;background:#1b2435;color:#e6eef6;}
.btn{padding:8px 12px;border:none;border-radius:8px;background:linear-gradient(90deg,#2dd4bf,#60a5fa);color:#05202a;cursor:pointer;font-weight:bold;}
.btn:hover{opacity:0.9;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.upload-btn{padding:7px 10px;border:none;border-radius:8px;background:#1b2435;color:#9aa6bd;cursor:pointer;font-size:18px;line-height:1;}
.upload-btn:hover{background:#243050;color:#e6eef6;}
.upload-btn:disabled{opacity:0.4;cursor:not-allowed;}
#fileInput{display:none;}
#filePreview{display:none;padding:6px 10px;background:#1b2435;border-top:1px solid #243050;font-size:0.85em;color:#9aa6bd;align-items:center;gap:8px;flex-shrink:0;}
#filePreview span{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#clearFile{background:none;border:none;color:#f87171;cursor:pointer;font-size:16px;padding:0;}
#uploadProgress{display:none;padding:4px 10px;background:#0b1220;font-size:0.8em;color:#2dd4bf;flex-shrink:0;}
.msg-image{max-width:260px;max-height:200px;border-radius:6px;display:block;margin-top:6px;cursor:pointer;}
.msg-file{display:inline-flex;align-items:center;gap:6px;margin-top:6px;padding:6px 10px;background:rgba(255,255,255,0.07);border-radius:6px;text-decoration:none;color:#60a5fa;font-size:0.9em;}
.msg-file:hover{background:rgba(255,255,255,0.12);}
.pop{display:none;position:fixed;z-index:1000;padding-top:120px;left:0;top:0;width:100%;height:100%;overflow:auto;background-color:rgba(0,0,0,0.4);}
.pop-content{position:relative;background:#f5f5f5;margin:auto;border:2px solid #888;padding:20px;border-radius:20px;width:400px;color:#28282e;box-shadow:0 4px 8px rgba(0,0,0,0.2);text-align:center;}
.close{position:absolute;color:#000;top:12px;right:12px;font-size:24px;font-weight:bold;cursor:pointer;}
.close:hover{color:#d1cfcf;}
#lightbox{display:none;position:fixed;z-index:2000;left:0;top:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;}
#lightbox img{max-width:90%;max-height:90%;border-radius:8px;}
#lightbox.open{display:flex;}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
</head>
<body>
<div class="wrap">
  <aside class="panel">
    <h2 id="Instruct">Sign Up / Login</h2>
    <input type="number" id="schoolIdInput" placeholder="School ID...">
    <input type="password" id="passwordInput" placeholder="Password...">
    <button id="loginBtn" class="btn">Login</button>
    <button id="signupBtn" class="btn">Sign Up</button>
    <div id="userView" style="display:none;margin-top:20px;">
      <div id="currentUser"></div>
      <button id="logoutBtn" class="btn" style="margin-top:10px;">Log out</button>
    </div>
  </aside>

  <!-- Change Password Modal -->
  <div id="myPop" class="pop">
    <div class="pop-content">
      <span class="close" id="closePop">×</span>
      <h2>Change Password</h2><br>
      <input type="password" id="currPass" placeholder="Current password" style="width:90%;height:34px;"><br><br>
      <input type="password" id="newPass" placeholder="New password" style="width:90%;height:34px;"><br><br>
      <button class="btn" id="changePassBtn2">Set Password</button>
    </div>
  </div>

  <!-- Sign Up Modal -->
  <div id="myPop2" class="pop">
    <div class="pop-content">
      <span class="close" id="closePop2">×</span>
      <h2>Create Account</h2><br>
      <input type="text" id="username1" placeholder="Enter a username" style="width:90%;height:30px;" maxlength="18"><br><br>
      <input type="password" id="password1" placeholder="Enter a password" style="width:90%;height:30px;"><br><br>
      <input type="number" id="num1" placeholder="Enter school ID" style="width:90%;height:30px;"><br><br>
      <button class="btn" id="signupBtn2">Sign Up</button>
    </div>
  </div>

  <!-- Image lightbox -->
  <div id="lightbox"><img id="lightboxImg" src="" alt="Full size image"></div>

  <main class="chat-area">
    <div class="chat-header">
      <div id="header">
        <h3>CompSci Chat</h3>
        <div id="headerUser"></div>
      </div>
      <div id="rightInfo" style="display:none;">Not logged in</div>
    </div>

    <div class="messages" id="messages"></div>

    <div id="filePreview">
      <span id="fileName">No file selected</span>
      <button id="clearFile" title="Remove file">✕</button>
    </div>
    <div id="uploadProgress">Uploading... <span id="uploadPct">0</span>%</div>

    <div class="compose">
      <input type="file" id="fileInput" accept="image/*,.py,.txt,.md,.csv,.json,.js,.html,.css">
      <button class="upload-btn" id="uploadBtn" disabled title="Attach file">📎</button>
      <input type="text" id="msgInput" placeholder="Sign in to send" disabled>
      <button id="sendBtn" class="btn" disabled>Send</button>
    </div>
  </main>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const firebaseConfig = {
    apiKey: "AIzaSyA9-gMEniY_sXFO6jMiZYgoYnAxPhu5oEc",
    authDomain: "chat-581be.firebaseapp.com",
    databaseURL: "https://chat-581be-default-rtdb.firebaseio.com",
    projectId: "chat-581be",
    storageBucket: "chat-581be.firebasestorage.app",
    messagingSenderId: "873296181303",
    appId: "1:873296181303:web:a9c0d1bbbd17e0074f27b2"
  };
  firebase.initializeApp(firebaseConfig);
  const db      = firebase.database();
  const storage = firebase.storage();

  const schoolIdInput  = document.getElementById('schoolIdInput');
  const passwordInput  = document.getElementById('passwordInput');
  const loginBtn       = document.getElementById('loginBtn');
  const signupBtn      = document.getElementById('signupBtn');
  const logoutBtn      = document.getElementById('logoutBtn');
  const currentUserEl  = document.getElementById('currentUser');
  const headerUser     = document.getElementById('headerUser');
  const Instruct       = document.getElementById('Instruct');
  const msgInput       = document.getElementById('msgInput');
  const sendBtn        = document.getElementById('sendBtn');
  const messagesEl     = document.getElementById('messages');
  const userView       = document.getElementById('userView');
  const uploadBtn      = document.getElementById('uploadBtn');
  const fileInput      = document.getElementById('fileInput');
  const filePreview    = document.getElementById('filePreview');
  const fileNameEl     = document.getElementById('fileName');
  const clearFileBtn   = document.getElementById('clearFile');
  const uploadProgress = document.getElementById('uploadProgress');
  const uploadPct      = document.getElementById('uploadPct');
  const lightbox       = document.getElementById('lightbox');
  const lightboxImg    = document.getElementById('lightboxImg');
  const myPop2         = document.getElementById('myPop2');
  const closePop2      = document.getElementById('closePop2');
  const username1      = document.getElementById('username1');
  const password1      = document.getElementById('password1');
  const num1           = document.getElementById('num1');
  const signupBtn2     = document.getElementById('signupBtn2');
  const myPop          = document.getElementById('myPop');
  const closePop       = document.getElementById('closePop');
  const currPass       = document.getElementById('currPass');
  const newPass        = document.getElementById('newPass');
  const changePassBtn2 = document.getElementById('changePassBtn2');

  let currentUser    = null;
  let selectedFile   = null;
  let activeUpload   = null;  // holds the current upload task so we can cancel it
  let uploadCancelled = false;
  const renderedKeys = new Set();

  // Modals
  signupBtn.addEventListener('click', () => { myPop2.style.display = "block"; });
  closePop2.addEventListener('click', () => { myPop2.style.display = "none"; });
  closePop.addEventListener('click',  () => { myPop.style.display  = "none"; });
  lightbox.addEventListener('click',  () => { lightbox.classList.remove('open'); });

  function openChangePassword() {
    currPass.value = ''; newPass.value = '';
    myPop.style.display = 'block';
  }

  // File picker
  uploadBtn.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (!file) return;
    if (file.size > 10 * 1024 * 1024) {
      alert("File too large — max 10 MB.");
      fileInput.value = '';
      return;
    }
    selectedFile = file;
    fileNameEl.textContent = file.name;
    filePreview.style.display = 'flex';
  });

  clearFileBtn.addEventListener('click', () => {
    // If an upload is in progress, cancel it
    if (activeUpload) {
      activeUpload.cancel();
      activeUpload = null;
    }
    uploadCancelled = true;
    selectedFile = null;
    fileInput.value = '';
    filePreview.style.display    = 'none';
    uploadProgress.style.display = 'none';
    sendBtn.disabled   = false;
    uploadBtn.disabled = false;
  });

  // Sign-up
  signupBtn2.addEventListener('click', async () => {
    const u = username1.value.trim();
    const p = password1.value.trim();
    const n = num1.value.trim();
    if (!u || !p || !n) return alert("Fill all fields");
    const email = n + "@churchill-academy.org";
    try {
      const cred = await firebase.auth().createUserWithEmailAndPassword(email, p);
      await db.ref('users/' + cred.user.uid).set({ name: u, handle: email });
      await cred.user.sendEmailVerification();
      alert("Account created! Check your school email to verify before logging in.");
      await firebase.auth().signOut();
      myPop2.style.display = "none";
      username1.value = ''; password1.value = ''; num1.value = '';
    } catch (err) { alert(err.message); }
  });

  // Login
  loginBtn.addEventListener('click', async () => {
    const schoolId = schoolIdInput.value.trim();
    const pass     = passwordInput.value.trim();
    if (!schoolId || !pass) return alert("Enter your school ID and password");
    const email = schoolId + "@churchill-academy.org";
    try {
      const cred = await firebase.auth().signInWithEmailAndPassword(email, pass);
      if (!cred.user.emailVerified) {
        await firebase.auth().signOut();
        return alert("Please verify your email before logging in.");
      }
    } catch (err) {
      if (err.code === 'auth/wrong-password' || err.code === 'auth/invalid-credential') alert("Incorrect password.");
      else if (err.code === 'auth/user-not-found') alert("No account found. Please sign up first.");
      else alert(err.message);
    }
  });

  // Logout
  logoutBtn.addEventListener('click', () => firebase.auth().signOut());

  // Change Password
  changePassBtn2.addEventListener('click', async () => {
    const curr = currPass.value.trim();
    const neu  = newPass.value.trim();
    if (!curr || !neu) return alert("Please fill both fields");
    try {
      const user = firebase.auth().currentUser;
      if (!user) return alert("You must be logged in");
      const cred = firebase.auth.EmailAuthProvider.credential(currentUser.handle, curr);
      await user.reauthenticateWithCredential(cred);
      await user.updatePassword(neu);
      alert("Password changed successfully!");
      myPop.style.display = 'none';
    } catch (err) { alert("Error: " + err.message); }
  });

  // UI
  function updateUI() {
    if (currentUser) {
      schoolIdInput.style.display = 'none';
      passwordInput.style.display = 'none';
      signupBtn.style.display     = 'none';
      loginBtn.style.display      = 'none';
      userView.style.display      = 'block';
      currentUserEl.textContent   = `${currentUser.name} (${currentUser.handle})`;
      headerUser.textContent      = currentUser.name;
      Instruct.textContent        = `Hello ${currentUser.name}`;
      msgInput.disabled           = false;
      msgInput.placeholder        = 'Type a message...';
      sendBtn.disabled            = false;
      uploadBtn.disabled          = false;
      const right = document.getElementById('rightInfo');
      right.style.display = 'block';
      right.innerHTML = `<button class="btn" id="changePassBtn">Change Password</button>`;
      document.getElementById('changePassBtn').onclick = openChangePassword;
    } else {
      schoolIdInput.style.display = 'block';
      passwordInput.style.display = 'block';
      signupBtn.style.display     = 'inline-block';
      loginBtn.style.display      = 'inline-block';
      userView.style.display      = 'none';
      headerUser.textContent      = 'Not signed in';
      Instruct.textContent        = 'Sign Up / Login';
      msgInput.disabled           = true;
      msgInput.placeholder        = 'Sign in to send';
      sendBtn.disabled            = true;
      uploadBtn.disabled          = true;
      document.getElementById('rightInfo').style.display = 'none';
    }
  }

  // Render messages
  function isImage(name) { return /\.(jpg|jpeg|png|gif|webp|svg)$/i.test(name); }
  function fileIcon(name) {
    if (/\.py$/i.test(name))   return '🐍';
    if (/\.js$/i.test(name))   return '📜';
    if (/\.html$/i.test(name)) return '🌐';
    if (/\.css$/i.test(name))  return '🎨';
    if (/\.json$/i.test(name)) return '📋';
    if (/\.csv$/i.test(name))  return '📊';
    if (/\.md$/i.test(name))   return '📝';
    return '📄';
  }

  function renderMessage(key, msg) {
    if (!msg || renderedKeys.has(key)) return;
    renderedKeys.add(key);

    const div  = document.createElement('div');
    const isMe = currentUser && currentUser.handle === msg.userHandle;
    div.className = 'msg' + (isMe ? ' me' : '');
    const time = msg.time ? new Date(msg.time).toLocaleTimeString() : '';

    let body = msg.text ? msg.text : '';

    if (msg.fileURL && msg.fileName) {
      if (isImage(msg.fileName)) {
        body += `<br><img class="msg-image" src="${msg.fileURL}" alt="${msg.fileName}" title="Click to enlarge">`;
      } else {
        body += `<br><a class="msg-file" href="${msg.fileURL}" target="_blank" rel="noopener">${fileIcon(msg.fileName)} ${msg.fileName}</a>`;
      }
    }

    div.innerHTML = `<strong>${msg.userName}</strong> <span style="color:#9aa6bd;font-size:0.8em">${msg.userHandle}</span><br>${body}<br><small style="color:#9aa6bd">${time}</small>`;

    const img = div.querySelector('.msg-image');
    if (img) {
      img.addEventListener('click', () => {
        lightboxImg.src = msg.fileURL;
        lightbox.classList.add('open');
      });
    }

    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function loadMessages() {
    db.ref('messages').off();
    renderedKeys.clear();
    messagesEl.innerHTML = '';
    db.ref('messages').on('child_added', snap => renderMessage(snap.key, snap.val()));
  }

  // Send message (with optional file)
  async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text && !selectedFile) return;
    if (!currentUser) return;

    sendBtn.disabled   = true;
    uploadBtn.disabled = true;

    let fileURL  = null;
    let fileName = null;

    if (selectedFile) {
      const path = `uploads/${currentUser.uid}/${Date.now()}_${selectedFile.name}`;
      const ref  = storage.ref(path);
      const task = ref.put(selectedFile);
      activeUpload    = task;
      uploadCancelled = false;

      uploadProgress.style.display = 'block';

      try {
        await new Promise((resolve, reject) => {
          task.on('state_changed',
            snap => { uploadPct.textContent = Math.round((snap.bytesTransferred / snap.totalBytes) * 100); },
            reject,
            resolve
          );
        });

        // If user hit X during upload, bail out — don't write to DB
        if (uploadCancelled) {
          uploadProgress.style.display = 'none';
          sendBtn.disabled   = false;
          uploadBtn.disabled = false;
          return;
        }

        fileURL  = await ref.getDownloadURL();
        fileName = selectedFile.name;
      } catch (err) {
        uploadProgress.style.display = 'none';
        sendBtn.disabled   = false;
        uploadBtn.disabled = false;
        // If cancelled by user, don't show an error
        if (!uploadCancelled) alert("Upload failed: " + err.message);
        return;
      }

      activeUpload                  = null;
      uploadProgress.style.display  = 'none';
      filePreview.style.display     = 'none';
      selectedFile = null;
      fileInput.value = '';
    }

    await db.ref('messages').push({
      userName:   currentUser.name,
      userHandle: currentUser.handle,
      text:       text || '',
      fileURL:    fileURL  || null,
      fileName:   fileName || null,
      time:       new Date().toISOString()
    });

    msgInput.value     = '';
    sendBtn.disabled   = false;
    uploadBtn.disabled = false;
  }

  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  // Auth state
  firebase.auth().onAuthStateChanged(async user => {
    if (user && user.emailVerified) {
      try {
        const snap    = await db.ref('users/' + user.uid).once('value');
        const profile = snap.val();
        currentUser = {
          uid:    user.uid,
          name:   profile ? profile.name   : user.email,
          handle: profile ? profile.handle : user.email
        };
      } catch {
        currentUser = { uid: user.uid, name: user.email, handle: user.email };
      }
    } else {
      if (user && !user.emailVerified) {
        alert("Please verify your email first.");
        firebase.auth().signOut();
        return;
      }
      currentUser = null;
    }
    updateUI();
    loadMessages();
  });
});
</script>
</body>
</html>
